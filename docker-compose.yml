services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.local
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      API_HOST: ${API_HOST:-localhost}
      API_PORT: ${API_PORT:-8000}
      DATA_CACHE_DIR: ${DATA_CACHE_DIR:-ml/cache}
      ARTIFACT_DIR: ${ARTIFACT_DIR:-ml/artifacts}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/commodity_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_ENV: ${INFISICAL_ENV:-dev}
      INFISICAL_TOKEN: ${INFISICAL_TOKEN:-}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}
      INFISICAL_API_URL: ${INFISICAL_API_URL:-}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - ./ml:/app/ml

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - frontend/.env.local
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commodity_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
